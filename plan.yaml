      \ `notify_tools_changed` can later send notifications to all active upstream\
      \ clients.\n\nOptions:\n1. Store sessions in the existing `_runtime` object\
      \ (add a `sessions` field)\n2. Capture session in the handler and pass to a\
      \ session registry\n\nPreferred: Add `sessions: list[ServerSession]` or similar\
      \ to runtime state, capture in _list_tools handler.\n\n### notify_tools_changed\n\
      Current signature (upstream.py line 436):\n```python\nasync def notify_tools_changed(connection:\
      \ ConnectionContext, tools_digest: str) -> None:\n```\n\nThe current implementation\
      \ is a no-op (lines 455-456):\n```python\nif connection.connection_id and tools_digest:\n\
      \    return\n```\n\nThe new implementation needs to:\n- Access stored sessions\n\
