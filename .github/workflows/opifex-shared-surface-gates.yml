name: opifex-shared-surface-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  OPIFEX_REPOSITORY: ${{ vars.OPIFEX_REPOSITORY || format('{0}/opifex', github.repository_owner) }}
  OPIFEX_REF: ${{ vars.OPIFEX_REF || 'main' }}

jobs:
  expected-red:
    name: mcp-tela / opifex shared-surface expected-red
    runs-on: ubuntu-latest
    steps:
      - name: Check out mcp-tela
        uses: actions/checkout@v4

      - name: Check out opifex authority
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPIFEX_REPOSITORY }}
          ref: ${{ env.OPIFEX_REF }}
          path: opifex-authority

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev environment
        run: uv sync --frozen --group dev

      - name: Seed forbidden-vocabulary drift and prove red
        env:
          OPIFEX_ROOT: ${{ github.workspace }}/opifex-authority
        run: uv run python scripts/ci/mcp_tela_shared_surface_gate.py expected-red

  green:
    name: mcp-tela / opifex shared-surface green
    runs-on: ubuntu-latest
    needs:
      - expected-red
    steps:
      - name: Check out mcp-tela
        uses: actions/checkout@v4

      - name: Check out opifex authority
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPIFEX_REPOSITORY }}
          ref: ${{ env.OPIFEX_REF }}
          path: opifex-authority

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev environment
        run: uv sync --frozen --group dev

      - name: Run repo-local opifex shared-surface gate
        env:
          OPIFEX_ROOT: ${{ github.workspace }}/opifex-authority
        run: uv run python scripts/ci/mcp_tela_shared_surface_gate.py green
