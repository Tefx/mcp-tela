      allowlists/guards around /health, /status, /connect, and /disconnect.

      IMPORTANT: verify sibling auth paths on the mounted surface, not only direct
      handler logic.


      ## KNOWN RISKS (from project history)

      - Integration wiring can pass unit tests while failing at the real runtime surface.
