name: opifex-shared-surface-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  expected-red:
    name: mcp-tela / opifex shared-surface expected-red
    runs-on: ubuntu-latest
    steps:
      - name: Check out mcp-tela
        uses: actions/checkout@v4

      - name: Read frozen opifex authority pin
        id: opifex-authority
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("design/opifex-frozen-authority-packet.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"repository={payload['repository']}\n")
              handle.write(f"ref={payload['ref']}\n")
          PY

      - name: Check out opifex authority
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.opifex-authority.outputs.repository }}
          ref: ${{ steps.opifex-authority.outputs.ref }}
          path: opifex-authority

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev environment
        run: uv sync --frozen --group dev

      - name: Seed forbidden-vocabulary drift and prove red
        env:
          OPIFEX_ROOT: ${{ github.workspace }}/opifex-authority
        run: uv run python scripts/ci/mcp_tela_shared_surface_gate.py expected-red

  green:
    name: mcp-tela / opifex shared-surface green
    runs-on: ubuntu-latest
    needs:
      - expected-red
    steps:
      - name: Check out mcp-tela
        uses: actions/checkout@v4

      - name: Read frozen opifex authority pin
        id: opifex-authority
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("design/opifex-frozen-authority-packet.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"repository={payload['repository']}\n")
              handle.write(f"ref={payload['ref']}\n")
          PY

      - name: Check out opifex authority
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.opifex-authority.outputs.repository }}
          ref: ${{ steps.opifex-authority.outputs.ref }}
          path: opifex-authority

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev environment
        run: uv sync --frozen --group dev

      - name: Run repo-local opifex shared-surface gate
        env:
          OPIFEX_ROOT: ${{ github.workspace }}/opifex-authority
        run: uv run python scripts/ci/mcp_tela_shared_surface_gate.py green
