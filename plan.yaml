    description: 'Add ASGI middleware class to src/tela/shell/http_auth.py. Must exempt
      GET /health, reject all other unauthenticated requests with 401 + JSON error
      body {"error": "AUTH_INVALID_TOKEN: ..."} matching existing format in gateway.py
