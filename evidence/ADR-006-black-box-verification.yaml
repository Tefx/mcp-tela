  ### Test 3: Ambiguous Failures Fail Closed
  
  - **step_intent**: Verify TimeoutError and BrokenPipeError do NOT trigger recovery retry
  - **expected_result**: Single call attempt, DOWNSTREAM_UNAVAILABLE, recovery_attempted=False, recovery_eligible=False
  - **observed_result**: PASS - Both tests verified exactly 1 call attempt, correct error shape
  - **failure_alignment**: N/A (tests passed)
