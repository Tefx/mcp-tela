version: 1
project: tela
context: 'MCP aggregation gateway. Connects downstream MCP servers and exposes them
  as a

  single upstream MCP endpoint with profile-based tool filtering and policy

  enforcement.


  Key features:

  - Aggregate multiple MCP servers behind one endpoint

  - Server-is-family tool mapping with per-tool overrides

  - Per-tool-family posture filtering and side-effect policy enforcement

  - Capability token authentication (HMAC + TTL, dual-key rotation) or open mode

  - Structured audit logging (L1/L2/L3)

  - Hot reload of downstream tool lists and configuration

  - Standard MCP stdio transport

  '
phases:
- id: core-foundation
  name: Core Foundation
  status: pending
  steps:
  - id: core.errors
    name: Error codes module
    status: pending
    description: Implement core error types from contracts/errors.yaml. AUTHZ_DENY
      (200), PROFILE_NOT_FOUND (201), TOKEN_INVALID (202), TOKEN_EXPIRED (203), TOOL_CONFLICT
      (204), TOOL_UNCLASSIFIED (205), DOWNSTREAM_ERROR (210), DOWNSTREAM_UNAVAILABLE
      (211). Pure logic with dataclass contracts.
    verification: pytest tests/core/test_errors.py
    refs:
    - contracts/errors.yaml
    - INTERFACES.md#section-j
  - id: core.posture
    name: Posture classification
    status: pending
    description: 'Implement posture enum (none, read_only, read_write) with comparison
      operators. Posture check: is tool posture <= profile posture ceiling? Pure logic.'
    verification: pytest tests/core/test_posture.py
    refs:
    - INTERFACES.md#section-c
  - id: core.profiles
    name: Profile models
    status: pending
    description: 'ProfileSpec dataclass: name, tools (family->posture map), tool_overrides
      (family->tool->posture), side_effect_policy (allow/read_only). Validation logic.'
    verification: pytest tests/core/test_profiles.py
    refs:
    - INTERFACES.md#section-b
  - id: core.token
    name: Capability token model
    status: pending
    description: 'CapabilityToken dataclass: token_id, tools_profile, persona_ref
      (opt), instance_id (opt), max_depth (opt), issued_at, expires_at, signature.
      Required vs optional field validation.'
    verification: pytest tests/core/test_token.py
    refs:
    - INTERFACES.md#section-g
  - id: core.server-config
    name: Server configuration model
    status: pending
    description: 'ServerConfig dataclass: command/url, args (opt), family (opt), tool_overrides
      (opt), default_posture (opt=none). Server-is-family convention implementation.'
    verification: pytest tests/core/test_server_config.py
    refs:
    - INTERFACES.md#section-b
  - id: core.tool
    name: Tool metadata model
    status: pending
    description: 'ToolMetadata dataclass: name, family, posture (opt), annotations
      (opt). Family resolution: server-is-family default, tool_overrides, explicit
      family field. Posture classification: tool_overrides > MCP annotations > default_posture.'
    verification: pytest tests/core/test_tool.py
    refs:
    - INTERFACES.md#section-c
- id: config-layer
  name: Configuration Layer
  status: locked
  depends_on:
  - core-foundation
  steps:
  - id: config.load
    name: Configuration loader
    status: pending
    description: Load tela.yaml, parse servers/profiles/auth/audit sections. Shell
      module for file I/O.
    verification: pytest tests/shell/test_config_loader.py
    refs:
    - INTERFACES.md#section-b
  - id: config.env-expansion
    name: Environment variable expansion
    status: pending
    description: Expand all  references in config values. Fail on unset variables
      with clear error messages.
    verification: pytest tests/shell/test_env_expansion.py
    refs:
    - INTERFACES.md#section-b
  - id: config.validation
    name: Configuration validation
    status: pending
