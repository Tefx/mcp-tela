    name: 'B4: Fix hot reload rollback isolation'
    status: done
    description: "step_type: implementation\nagent_source: default\nspec_refs:\n \
      \ - docs/DESIGN.md#4.12 shell/reload.py -- Hot Reload Orchestration\n  - docs/DESIGN.md#No-drop-connection\
      \ invariant\ntouch_paths:\n  - src/tela/shell/reload.py\n  - src/tela/shell/downstream.py\n\
      harness_refs:\n  - tests/integration/test_hot_reload.py\n  - tests/shell/test_reload.py\n\
      conflict_rationale: Serialized with B2 because both touch registry state.\n\n\
      Problem:\n- When server 'custom' reload is rejected due to conflict, server\
      \ 'fs' tools are also lost\n- `get_tool_server('read_file')` returns `None`\
      \ after rejection\n- Spec says preserve original tools on conflict rollback\n\
      \nRoot cause:\n- `on_tools_changed()` calls `registry.register(server_name,\
      \ resolved)` which updates `_tool_to_server` globally\n- On conflict rollback,\
      \ only the changed server's tools are restored\n- But the flat `_tool_to_server`\
      \ map may have been corrupted for other servers\n\nFix:\n1. In `on_tools_changed()`,\
      \ snapshot FULL registry state before tentative register\n2. On conflict, restore\
      \ entire snapshot (both `_tools_by_server` and `_tool_to_server`)\n3. Add `DownstreamRegistry.snapshot()`\
      \ and `DownstreamRegistry.restore(snapshot)` methods\n\nState semantics:\n-\
      \ Snapshot is shallow copy of both dicts (tools are immutable ResolvedTool)\n\
      - Rollback must be atomic: either all restored or none\n- Previous_tools variable\
      \ is no longer sufficient for rollback"
    verification: '- After rejected reload of server ''custom'', server ''fs'' tools
      remain intact

      - get_tool_server(''read_file'') returns ''fs'' after rejected reload

