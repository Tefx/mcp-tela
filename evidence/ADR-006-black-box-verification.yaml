  1. **Error Envelope Stability**: Both eligible and ineligible failures return `TelaError(code="DOWNSTREAM_UNAVAILABLE")`. The error family is stable.
  
  2. **Recovery Field Presence**: Even when recovery is not attempted (`recovery_attempted=False`), the error shape includes recovery metadata fields. This is correct per ADR-006 Error Payload Contract.
  
