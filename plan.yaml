      mode, at least one server defined.
    verification: pytest tests/shell/test_config_validation.py
    refs:
    - INTERFACES.md#section-b
- id: enforcement-chain
  name: Enforcement Chain
  status: locked
  depends_on:
  - core-foundation
  steps:
  - id: enforce.layer1-token
    name: 'Layer 1: Token validation'
    status: pending
    description: 'Verify HMAC signature (dual-key: try primary, then secondary), check
      expires_at not in past. If invalid, deny with TOKEN_INVALID or TOKEN_EXPIRED.
      Pure logic.'
    verification: pytest tests/core/test_enforce_token.py
    refs:
    - INTERFACES.md#section-d
  - id: enforce.layer2-profile
    name: 'Layer 2: Profile lookup'
    status: pending
    description: Resolve tools_profile from token to ProfileSpec in config. If not
      found, deny with PROFILE_NOT_FOUND.
    verification: pytest tests/core/test_enforce_profile.py
    refs:
    - INTERFACES.md#section-d
    depends_on:
    - enforce.layer1-token
  - id: enforce.layer3-family
    name: 'Layer 3: Family admission'
    status: pending
    description: Check if tool's family exists in bound profile's tools map. If not,
      deny with AUTHZ_DENY.
    verification: pytest tests/core/test_enforce_family.py
    refs:
    - INTERFACES.md#section-d
    depends_on:
    - enforce.layer2-profile
  - id: enforce.layer4-posture
    name: 'Layer 4: Posture check'
    status: pending
    description: 'If posture classification available: is tool posture <= profile
      posture ceiling for that family? If exceeded, deny with AUTHZ_DENY. If unclassified:
      subject to default_posture (deny by default).'
    verification: pytest tests/core/test_enforce_posture.py
    refs:
    - INTERFACES.md#section-d
    depends_on:
    - enforce.layer3-family
  - id: enforce.layer5-override
    name: 'Layer 5: Tool override check'
    status: pending
    description: 'If profile has tool_overrides for this specific tool: apply it (deny
      or allow), overriding posture check result.'
    verification: pytest tests/core/test_enforce_override.py
    refs:
    - INTERFACES.md#section-d
    depends_on:
    - enforce.layer4-posture
  - id: enforce.layer6-sideeffect
    name: 'Layer 6: Side-effect check'
    status: pending
    description: 'If tool''s effective posture > read_only and profile''s side_effect_policy
      is read_only: deny with AUTHZ_DENY.'
    verification: pytest tests/core/test_enforce_sideeffect.py
    refs:
    - INTERFACES.md#section-d
    depends_on:
    - enforce.layer5-override
  - id: enforce.layer7-effective
    name: 'Layer 7: Effective policy'
    status: pending
    description: Combine all layers results. Tool call forwarded to downstream only
      if every layer permits it. Pure logic for policy decision.
    verification: pytest tests/core/test_enforce_effective.py
    refs:
    - INTERFACES.md#section-d
    depends_on:
    - enforce.layer6-sideeffect
