  - **step_intent**: Verify exhausted recovery returns DOWNSTREAM_UNAVAILABLE (NOT new error code)
  - **expected_result**: `TelaError(code="DOWNSTREAM_UNAVAILABLE")` with recovery fields populated
  - **observed_result**: PASS - Consistent error shape with required fields
